openapi: 3.0.3
info:
  title: Cloud-Native Transaction Processing API
  version: 0.1.0
  description: |
    API contract for ingestion, transaction lookup, and reporting services.

    Notes:
    - This contract is intended for initial implementation and team alignment.
    - All timestamps use ISO-8601 UTC format.
servers:
  - url: https://api.example.com
    description: Production endpoint (replace with real domain)
  - url: http://localhost:3000
    description: Local development endpoint
tags:
  - name: Ingestion
    description: Transaction ingestion endpoints
  - name: Transactions
    description: Transaction query endpoints
  - name: Reporting
    description: Reporting and analytics endpoints
  - name: Health
    description: Health/readiness probes

paths:
  /transactions:
    post:
      tags: [Ingestion]
      summary: Ingest a new transaction
      description: |
        Accepts a transaction payload and stores it with initial status `RECEIVED`.
        # Idempotency rule:
        # If the same Idempotency-Key is sent again with the same payload,
        # return the original result (201 or 200 depending on implementation).
      operationId: createTransaction
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionCreateRequest'
            examples:
              sample:
                value:
                  transaction_id: c66ac98a-b9e5-4f16-a83b-6f396f7e525f
                  timestamp: 2026-03-19T10:21:11Z
                  sender_account: ACCT_10001
                  receiver_account: ACCT_90001
                  merchant_id: M12345
                  amount: "1250.50"
                  currency: USD
                  transaction_type: PAYMENT
                  channel: MOBILE_APP
                  metadata:
                    ip: 203.0.113.10
                    device_id: DEV-7788
      responses:
        '201':
          description: Transaction accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /transactions/{transaction_id}:
    get:
      tags: [Transactions]
      summary: Get transaction status and risk result
      operationId: getTransactionById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - name: transaction_id
          in: path
          required: true
          description: Client-level transaction identifier (UUID)
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Transaction found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /reports/daily-volume:
    get:
      tags: [Reporting]
      summary: Daily transaction volume summary
      operationId: getDailyVolumeReport
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - name: date
          in: query
          required: true
          description: Report date in UTC
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Daily report returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyVolumeReportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /reports/merchant-ranking:
    get:
      tags: [Reporting]
      summary: Merchant ranking by transaction amount
      operationId: getMerchantRankingReport
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Merchant ranking returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MerchantRankingReportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /reports/risk-distribution:
    get:
      tags: [Reporting]
      summary: Risk score bucket distribution
      operationId: getRiskDistributionReport
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Risk distribution returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskDistributionReportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /healthz:
    get:
      tags: [Health]
      summary: Liveness probe endpoint
      operationId: healthz
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /readyz:
    get:
      tags: [Health]
      summary: Readiness probe endpoint
      operationId: readyz
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  parameters:
    XRequestId:
      name: X-Request-Id
      in: header
      required: false
      description: Correlation ID for tracing across services
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Unique key for safe client retries.
        # Recommended TTL for key cache/table: 24 hours.
      schema:
        type: string
        minLength: 8
        maxLength: 128

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Invalid request payload or query parameter
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Duplicate request or conflict with resource state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: Request rate exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    TransactionCreateRequest:
      type: object
      required:
        - transaction_id
        - timestamp
        - sender_account
        - receiver_account
        - merchant_id
        - amount
        - currency
        - transaction_type
      properties:
        transaction_id:
          type: string
          format: uuid
          description: Client-provided unique transaction id
        timestamp:
          type: string
          format: date-time
        sender_account:
          type: string
          minLength: 3
          maxLength: 64
        receiver_account:
          type: string
          minLength: 3
          maxLength: 64
        merchant_id:
          type: string
          minLength: 2
          maxLength: 64
        amount:
          type: string
          pattern: '^[0-9]+(\.[0-9]{1,2})?$'
          description: |
            Decimal amount as string.
            # Use string to avoid client floating-point precision issues.
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          description: ISO-4217 currency code (e.g., USD)
        transaction_type:
          type: string
          enum: [PAYMENT, REFUND, TRANSFER]
        channel:
          type: string
          enum: [MOBILE_APP, WEB, POS, BATCH]
          default: WEB
        metadata:
          type: object
          additionalProperties: true

    TransactionCreateResponse:
      type: object
      required: [transaction_id, status, created_at, request_id]
      properties:
        transaction_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [RECEIVED]
        created_at:
          type: string
          format: date-time
        request_id:
          type: string
          format: uuid

    TransactionDetailResponse:
      type: object
      required:
        - transaction_id
        - status
        - amount
        - currency
        - risk_score
        - created_at
      properties:
        transaction_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [RECEIVED, VALID, REJECTED]
        amount:
          type: string
        currency:
          type: string
        risk_score:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        reject_reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        validated_at:
          type: string
          format: date-time
          nullable: true

    DailyVolumeReportResponse:
      type: object
      properties:
        date:
          type: string
          format: date
        totals:
          type: object
          properties:
            count:
              type: integer
            total_amount:
              type: string
        by_status:
          type: array
          items:
            type: object
            properties:
              status:
                type: string
              count:
                type: integer
              total_amount:
                type: string

    MerchantRankingReportResponse:
      type: object
      properties:
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        rows:
          type: array
          items:
            type: object
            properties:
              merchant_id:
                type: string
              txn_count:
                type: integer
              total_amount:
                type: string

    RiskDistributionReportResponse:
      type: object
      properties:
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        buckets:
          type: array
          items:
            type: object
            properties:
              bucket:
                type: string
                example: 0-20
              count:
                type: integer

    ErrorResponse:
      type: object
      required: [error, request_id, timestamp]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - VALIDATION_ERROR
                - UNAUTHORIZED
                - FORBIDDEN
                - NOT_FOUND
                - CONFLICT_DUPLICATE
                - RATE_LIMITED
                - INTERNAL_ERROR
            message:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  reason:
                    type: string
        request_id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time

    HealthResponse:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          enum: [ok, not_ready]
        timestamp:
          type: string
          format: date-time
