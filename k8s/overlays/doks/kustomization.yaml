apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: transaction-platform

resources:
  - ../../base
  - hpa.yaml

configMapGenerator:
  - name: transaction-platform-config
    behavior: replace
    envs:
      - config.env

secretGenerator:
  - name: transaction-platform-secrets
    behavior: replace
    envs:
      - secrets.env

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: transaction-reporting-service
    newName: registry.digitalocean.com/REPLACE_WITH_DOKR_REGISTRY/transaction-reporting-service
    newTag: latest

patches:
  - path: backend-service-patch.yaml
    target:
      version: v1
      kind: Service
      name: transaction-backend
  - path: postgres-pvc-patch.yaml
  - path: backend-deployment-patch.yaml