apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-reporting
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transaction-reporting
  template:
    metadata:
      labels:
        app: transaction-reporting
    spec:
      containers:
        - name: reporting
          image: transaction-reporting-service:latest
          imagePullPolicy: IfNotPresent
          command:
            - node
            - backend/src/service/reporting/server.js
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: transaction-platform-config
                  key: PORT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: transaction-platform-config
                  key: LOG_LEVEL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: transaction-platform-secrets
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi