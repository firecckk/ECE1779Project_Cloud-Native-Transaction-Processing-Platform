apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-validation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transaction-validation
  template:
    metadata:
      labels:
        app: transaction-validation
    spec:
      containers:
        - name: validation
          image: transaction-reporting-service:latest
          imagePullPolicy: IfNotPresent
          command:
            - node
            - backend/src/service/validation/server.js
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: transaction-platform-config
                  key: PORT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: transaction-platform-config
                  key: LOG_LEVEL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: transaction-platform-secrets
                  key: DATABASE_URL
            - name: VALIDATION_BATCH_SIZE
              valueFrom:
                configMapKeyRef:
                  name: transaction-platform-config
                  key: VALIDATION_BATCH_SIZE
            - name: VALIDATION_POLL_INTERVAL_MS
              valueFrom:
                configMapKeyRef:
                  name: transaction-platform-config
                  key: VALIDATION_POLL_INTERVAL_MS
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi