apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-ingress-only-from-backend
spec:
  podSelector:
    matchLabels:
      app: transaction-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - transaction-ingestion
                  - transaction-validation
                  - transaction-reporting
      ports:
        - protocol: TCP
          port: 5432