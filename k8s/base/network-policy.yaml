apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-ingress-only-from-backend
spec:
  podSelector:
    matchLabels:
      app: transaction-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: transaction-backend
      ports:
        - protocol: TCP
          port: 5432