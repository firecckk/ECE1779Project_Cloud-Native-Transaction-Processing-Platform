apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transaction-frontend
  template:
    metadata:
      labels:
        app: transaction-frontend
    spec:
      containers:
        - name: frontend
          image: transaction-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: API_UPSTREAM
              value: transaction-reporting:8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi