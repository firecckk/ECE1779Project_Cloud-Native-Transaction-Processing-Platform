<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transaction Reports</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Report Query Console</h1>
        <p class="subtitle">Select a date range and fetch reporting data from backend.</p>

        <div class="controls">
          <label>
            From
            <input id="fromDate" type="date" />
          </label>
          <label>
            To
            <input id="toDate" type="date" />
          </label>
          <label>
            Top Merchants
            <input id="merchantLimit" type="number" min="1" value="10" />
          </label>
          <label>
            Risk Bucket Size
            <input id="bucketSize" type="number" min="1" max="100" value="20" />
          </label>
        </div>

        <div class="actions">
          <button id="queryAllBtn">Query All Reports</button>
          <button id="clearBtn" class="secondary">Clear</button>
        </div>

        <div id="status" class="status">Ready</div>
      </section>

      <section class="card">
        <h2>Daily Volume</h2>
        <div id="dailyVolume"></div>
      </section>

      <section class="card">
        <h2>Merchant Ranking</h2>
        <div id="merchantRanking"></div>
      </section>

      <section class="card">
        <h2>Risk Distribution</h2>
        <div id="riskDistribution"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
