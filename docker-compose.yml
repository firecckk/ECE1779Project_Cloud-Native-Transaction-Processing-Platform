services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:15-alpine
    container_name: transaction_db
    environment:
      POSTGRES_USER: transaction_user
      POSTGRES_PASSWORD: transaction_password
      POSTGRES_DB: transaction_platform
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - ./database:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transaction_user -d transaction_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - transaction_network

  # Frontend Service (placeholder for future development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: transaction_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://backend:8080
      NODE_ENV: development
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - transaction_network
    volumes:
      - ./frontend:/app/src

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transaction_api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://transaction_user:transaction_password@postgres:5432/transaction_platform
      LOG_LEVEL: INFO
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - transaction_network

volumes:
  postgres_data:
    driver: local

networks:
  transaction_network:
    driver: bridge
